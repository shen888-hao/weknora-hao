name: Build MinerU Image

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Free disk space
        run: |
          # GitHub 默认盘 14GB，清理出空间
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo apt-get clean
          docker system prune -af

      - name: Pull image with retry
        run: |
          for i in 1 2 3; do
            docker pull alexsuntop/mineru:latest && break
            sleep 30
          done

      - name: Save and split
        run: |
          docker save alexsuntop/mineru:latest | gzip -1 > mineru-cpu.tar.gz
          ls -lh mineru-cpu.tar.gz
          
          # 必分卷，1.9GB/个
          split -b 1900m mineru-cpu.tar.gz mineru-cpu.tar.gz.part-
          rm mineru-cpu.tar.gz  # 删大文件省空间
          ls -lh mineru-cpu.tar.gz.part-*

      - name: Upload to Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="mineru-cpu-$(date +%Y%m%d-%H%M%S)"
          gh release create "$TAG" \
            --repo ${{ github.repository }} \
            --title "MinerU CPU $TAG" \
            --notes "Split archives, cat to reassemble"
          
          # 逐个上传，避免命令太长
          for f in mineru-cpu.tar.gz.part-*; do
            echo "Uploading $f ..."
            gh release upload "$TAG" "$f" --repo ${{ github.repository }}
          done
